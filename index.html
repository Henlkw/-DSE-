<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文墨江湖：DSE 範文終極修煉</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --ink: #1a1a1a; --paper: #fcfaf2; --red: #9d2933; --gold: #b8860b; }
        body { background-color: #dcd3b2; background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png"); font-family: 'Noto Serif TC', serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .game-container { width: 100%; max-width: 650px; background: var(--paper); border-left: 18px solid #8b4513; border-right: 18px solid #8b4513; padding: 30px; box-shadow: 0 0 30px rgba(0,0,0,0.4); position: relative; min-height: 600px; }
        h1 { text-align: center; color: var(--ink); border-bottom: 2px solid var(--ink); padding-bottom: 10px; }
        
        .btn-option { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.03); border: 1px solid var(--ink); font-family: inherit; font-size: 16px; cursor: pointer; transition: 0.2s; position: relative; }
        .btn-option:hover { background: var(--ink); color: var(--paper); }
        .stage-card { background: rgba(0,0,0,0.03); border: 1px solid var(--ink); margin-bottom: 10px; padding: 15px; cursor: pointer; display: flex; justify-content: space-between; transition: 0.3s; }
        .stage-card:hover { transform: translateX(8px); background: var(--ink); color: var(--paper); }

        .correct-flash { background-color: #2d5a27 !important; color: white !important; }
        .wrong-flash { background-color: var(--red) !important; color: white !important; }
        .shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .hp-container { width: 100%; height: 10px; background: #ddd; margin: 10px 0; border: 1px solid var(--ink); }
        #hp-bar { height: 100%; width: 100%; background: #2d5a27; transition: 0.3s; }
        
        .seal { border: 4px solid var(--red); color: var(--red); padding: 5px 15px; font-size: 28px; font-weight: bold; display: inline-block; transform: rotate(-10deg); margin: 10px; }
        .review-item { text-align: left; background: #eee; padding: 10px; margin: 10px 0; border-left: 4px solid var(--red); font-size: 14px; }
        .achievement-badge { background: var(--gold); color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin: 2px; display: inline-block; }

        .hidden { display: none; }
        #library-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }
        .modal-content { background: var(--paper); width: 90%; max-width: 500px; margin: 40px auto; padding: 20px; border: 5px double var(--ink); max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="menu-screen">
        <h1>文墨江湖</h1>
        <p style="text-align:center;">範文終極修煉系統</p>
        
        <button id="resume-btn" class="btn-option hidden" onclick="resumeGame()" style="border: 2px solid var(--red); color: var(--red); font-weight: bold;">🔄 繼續上次進度</button>
        
        <button class="btn-option" onclick="showChapterSelect()">📜 分篇章作答</button>
        <button class="btn-option" onclick="initGame('random')">⚔️ 隨機大亂鬥</button>
        <button class="btn-option" onclick="toggleLibrary(true)">📚 進入藏經閣</button>
        <button class="btn-option" onclick="showAchievementBoard()">🏆 我的成就榜</button>
    </div>

    <div id="chapter-screen" class="hidden">
        <h2 style="text-align:center;">選擇章節</h2>
        <div id="chapter-list"></div>
        <button class="btn-option" style="border:none;" onclick="location.reload()">⬅ 返回</button>
    </div>

    <div id="status-bar" class="hidden">
        <div style="display:flex; justify-content:space-between; font-size:14px;">
            <span id="chapter-display" style="color:var(--red); font-weight:bold;">章節</span>
            <span>體力：<span id="hp-val">300</span></span>
        </div>
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div style="text-align:right; margin-bottom:5px;">
            <button id="mark-current" onclick="markQuestion()" style="cursor:pointer; background:none; border:1px solid #ccc; font-family:inherit; padding:2px 8px;">⭐ 標記此題</button>
        </div>
        <p id="question-text" style="font-size:18px; min-height:80px; line-height:1.6;"></p>
        <div id="options-box"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn-option" onclick="hintFromLibrary()" style="flex:1; font-size:14px;">💡 錦囊 (-10HP)</button>
            <button class="btn-option" onclick="location.reload()" style="flex:1; font-size:14px;">🏳️ 放棄</button>
        </div>
    </div>

    <div id="report-screen" class="hidden">
        <div id="report-content" style="text-align:center;"></div>
        <div id="achievement-display" style="text-align:center; margin: 15px 0;"></div>
        <hr>
        <h3 style="text-align:left;">📔 錯題及標記回顧</h3>
        <div id="review-list"></div>
        <button class="btn-option" onclick="location.reload()">重新修煉</button>
    </div>
</div>

<div id="library-modal">
    <div class="modal-content">
        <h2 id="lib-title" style="text-align:center;">藏經閣</h2>
        <div id="lib-nav" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:15px; border-bottom:1px solid var(--ink); padding-bottom:10px;"></div>
        <p id="lib-text" style="white-space:pre-wrap; line-height:1.8; font-family:serif; font-size:17px;"></p>
        <button class="btn-option" onclick="toggleLibrary(false)">退出</button>
    </div>
</div>

<script>

// 數據補充區
// ==========================================

    { id: 102, c: "論仁論孝論君子", q: "「仁者安仁，知者利仁」中，「安仁」的含義是？", a: "實踐仁德後內心感到安適", w: ["安靜地思考仁", "安裝仁義的門面", "安全地實施仁政"] },

const originalTexts = {
     "論仁論孝論君子": "【論仁】\n子曰：「不仁者，不可以久處約，不可以長處樂。仁者安仁，知者利仁。」(《里仁》第四)\n子曰：「富與貴，是人之所欲也；不以其道得之，不處也。貧與賤，是人之所惡也；不以其道得之，不去也。君子去仁，惡乎成名？君子無終食之間違仁，造次必於是，顛沛必於是。」(《里仁》第四)\n顏淵問仁。子曰：「克己復禮為仁。一日克己復禮，天下歸仁焉。為仁由己，而由人乎哉？」顏淵曰：「請問其目。」子曰：「非禮勿視，非禮勿聽，非禮勿言，非禮勿動。」顏淵曰：「回雖不敏，請事斯語矣。」(《顏淵》第十二)\n子曰：「志士仁人，無求生以害仁，有殺身以成仁。」(《衛靈公》第十五) \n\n【論孝】\n孟懿子問孝。子曰：「無違。」樊遲御，子告之曰：「孟孫問孝於我，我對曰，無違。」樊遲曰：「何謂也？」子曰：「生事之以禮；死葬之以禮，祭之以禮。」（《為政》第二）\n子游問孝。子曰：「今之孝者，是謂能養。至於犬馬，皆能有養；不敬，何以別乎！」（《為政》第二）\n子曰：「事父母幾諫，見志不從，又敬不違，勞而不怨。」(《里仁》第四) \n子曰：「父母之年，不可不知也。一則以喜，一則以懼。」(《里仁》第四) \n\n【論君子】\n子曰：「君子不重則不威；學則不固。主忠信。無友不如己者。過則勿憚改。」(《學而》第一)\n子曰：「君子坦蕩蕩，小人長戚戚。」(《述而》第七)\n司馬牛問君子。子曰：「君子不憂不懼。」曰：「不憂不懼，斯謂之君子矣乎？」子曰：「內省不疚，夫何憂何懼？」(《顏淵》第十二)\n子曰：「君子成人之美，不成人之惡。小人反是。」(《顏淵》第十二)\n子曰：「君子恥其言而過其行。」(《憲問》第十四)\n子曰：「君子義以為質，禮以行之，孫以出之，信以成之。君子哉！」(《衛靈公》第十五)\n子曰：「君子病無能焉，不病人之不己知也。」(《衛靈公》第十五)\n子曰：「君子求諸己，小人求諸人。」(《衛靈公》第十五)",
    "魚我所欲也": "孟子曰：「魚，我所欲也，熊掌，亦我所欲也；二者不可得兼，舍魚而取熊掌者也。生亦我所欲也，義亦我所欲也；二者不可得兼，舍生而取義者也。生亦我所欲，所欲有甚於生者，故不為苟得也；死亦我所惡，所惡有甚於死者，故患有所不辟也。如使人之所欲莫甚於生，則凡可以得生者，何不用也？使人之所惡莫甚於死者，則凡可以辟患者，何不為也？由是則生而有不用也，由是則可以辟患而有不為也，是故所欲有甚於生者，所惡有甚於死者。非獨賢者有是心也，人皆有之，賢者能勿喪耳。\n\n一簞食，一豆羹，得之則生，弗得則死。嘑爾而與之，行道之人弗受；蹴爾而與之，乞人不屑也；萬鍾則不辯禮義而受之。萬鍾於我何加焉？為宮室之美、妻妾之奉、所識窮乏者得我與？鄉為身死而不受，今為宮室之美為之；鄉為身死而不受，今為妻妾之奉為之；鄉為身死而不受，今為所識窮乏者得我而為之，是亦不可以已乎？此之謂失其本心。」",
      "逍遙遊": "惠子謂莊子曰：「魏王貽我大瓠之種，我樹之成而實五石。以盛水漿，其堅不能自舉也。剖之以為瓢，則瓠落無所容。非不呺然大也，吾為其無用而掊之。」莊子曰：「夫子固拙於用大矣！宋人有善為不龜手之藥者，世世以洴澼絖為事。客聞之，請買其方百金。聚族而謀曰：『我世世為洴澼絖，不過數金；今一朝而鬻技百金，請與之。』客得之，以說吳王。越有難，吳王使之將，冬與越人水戰，大敗越人，裂地而封之。能不龜手一也；或以封，或不免於洴澼絖，則所用之異也。今子有五石之瓠，何不慮以為大樽而浮於江湖，而憂其瓠落無所容，則夫子猶有蓬之心也夫！」\n\n惠子謂莊子曰：「吾有大樹，人謂之樗；其大本擁腫而不中繩墨，其小枝卷曲而不中規矩。立之塗，匠者不顧。今子之言，大而無用，衆所同去也。」莊子曰：「子獨不見狸狌乎？卑身而伏，以候敖者；東西跳梁，不辟高下，中於機辟，死於罔罟。今夫斄牛，其大若垂天之雲；此能為大矣，而不能執鼠。今子有大樹，患其無用，何不樹之於無何有之鄉，廣莫之野，彷徨乎無為其側，逍遙乎寢臥其下；不夭斤斧，物無害者。無所可用，安所困苦哉？」",
    "勸學": "君子曰：學不可以已。青，取之於藍，而青於藍；冰，水為之，而寒於水。木直中繩，輮以為輪，其曲中規；雖有槁暴、不復挺者，輮使之然也。故木受繩則直，金就礪則利，君子博學而日參省乎己，則知明而行無過矣。\n\n吾嘗終日而思矣，不如須臾之所學也；吾嘗跂而望矣，不如登高之博見也。登高而招，臂非加長也，而見者遠。順風而呼，聲非加疾也，而聞者彰。假輿馬者，非利足也，而致千里；假舟楫者，非能水也，而絕江河。君子生非異也，善假於物也。\n\n積土成山，風雨興焉；積水成淵，蛟龍生焉；積善成德，而神明自得，聖心備焉。故不積跬步，無以至千里；不積小流，無以成江海。騏驥一躍，不能十步；駑馬十駕，功在不舍。鍥而舍之，朽木不折；鍥而不舍，金石可鏤。螾無爪牙之利，筋骨之強，上食埃土，下飲黃泉，用心一也。蟹六跪而二螯，非蛇蟺之穴無可寄託者，用心躁也。",
    "廉頗藺相如列傳": "廉頗者，趙之良將也。趙惠文王十六年，廉頗為趙將伐齊，大破之，取陽晉，拜為上卿，以勇氣聞於諸侯。藺相如者，趙人也，為趙宦者令繆賢舍人。\n\n趙惠文王時，得楚和氏璧。秦昭王聞之，使人遺趙王書，願以十五城請易璧。趙王與大將軍廉頗諸大臣謀：欲予秦，秦城恐不可得，徒見欺；欲勿予，即患秦兵之來。計未定，求人可使報秦者，未得。宦者令繆賢曰：「臣舍人藺相如可使。」王問：「何以知之？」對曰：「臣嘗有罪，竊計欲亡走燕，臣舍人相如止臣，曰：『君何以知燕王？』臣語曰：『臣嘗從大王與燕王會境上，燕王私握臣手，曰「願結友。」以此知之，故欲往。』相如謂臣曰：『夫趙彊而燕弱，而君幸於趙王，故燕王欲結於君。今君乃亡趙走燕，燕畏趙，其勢必不敢留君，而束君歸趙矣。君不如肉袒伏斧質請罪，則幸得脫矣。』臣從其計，大王亦幸赦臣。臣竊以為其人勇士，有智謀，宜可使。」於是王召見，問藺相如曰：「秦王以十五城請易寡人之璧，可予不？」相如曰：「秦彊而趙弱，不可不許。」王曰：「取吾璧，不予我城，奈何？」相如曰：「秦以城求璧而趙不許，曲在趙；趙予璧而秦不予趙城，曲在秦。均之二策，寧許以負秦曲。」王曰：「誰可使者？」相如曰：「王必無人，臣願奉璧往使。城入趙而璧留秦；城不入，臣請完璧歸趙。」趙王於是遂遣相如奉璧西入秦。\n\n秦王坐章台見相如，相如奉璧奏秦王。秦王大喜，傳以示美人及左右，左右皆呼萬歲。相如視秦王無意償趙城，乃前曰：「璧有瑕，請指示王。」王授璧，相如因持璧，卻立，倚柱，怒髮上衝冠，謂秦王曰：「大王欲得璧，使人發書至趙王，趙王悉召羣臣議，皆曰：『秦貪，負其彊，以空言求璧，償城恐不可得』。議不欲予秦璧。臣以為布衣之交尚不相欺，況大國乎！且以一璧之故逆彊秦之驩，不可。於是趙王乃齋戒五日，使臣奉璧，拜送書於庭。何者？嚴大國之威以修敬也。今臣至，大王見臣列觀，禮節甚倨；得璧，傳之美人，以戲弄臣。臣觀大王無意償趙王城邑，故臣復取璧。大王必欲急臣，臣頭今與璧俱碎於柱矣！」相如持其璧睨柱，欲以擊柱。秦王恐其破璧，乃辭謝固請，召有司案圖，指從此以往十五都予趙。相如度秦王特以詐佯為予趙城，實不可得，乃謂秦王曰：「和氏璧，天下所共傳寶也。趙王恐，不敢不獻。趙王送璧時，齋戒五日，今大王亦宜齋戒五日，設九賓於廷，臣乃敢上璧。」秦王度之，終不可彊奪，遂許齋五日，舍相如廣成傳。相如度秦王雖齋，決負約不償城，乃使其從者衣褐，懷其璧，從徑道亡，歸璧於趙。\n\n秦王齋五日後，乃設九賓禮於廷，引趙使者藺相如。相如至，謂秦王曰：「秦自繆公以來二十餘君，未嘗有堅明約束者也。臣誠恐見欺於王而負趙，故令人持璧歸，間至趙矣。且秦彊而趙弱，大王遣一介之使至趙，趙立奉璧來；今以秦之彊而先割十五都予趙，趙豈敢留璧而得罪於大王乎？臣知欺大王之罪當誅，臣請就湯鑊。唯大王與羣臣孰計議之！」秦王與羣臣相視而嘻。左右或欲引相如去，秦王因曰：「今殺相如，終不能得璧也，而絕秦趙之驩，不如因而厚遇之，使歸趙，趙王豈以一璧之故欺秦邪！」卒廷見相如，畢禮而歸之。相如既歸，趙王以為賢大夫，使不辱於諸侯，拜相如為上大夫。秦亦不以城予趙，趙亦終不予秦璧。\n\n其後秦伐趙，拔石城。明年，復攻趙，殺二萬人。\n\n秦王使使者告趙王，欲與王為好會於西河外澠池。趙王畏秦，欲毋行。廉頗、藺相如計曰：「王不行，示趙弱且怯也。」趙王遂行，相如從。廉頗送至境，與王訣曰：「王行，度道里會遇之禮畢，還，不過三十日。三十日不還，則請立太子為王，以絕秦望。」王許之，遂與秦王會澠池。秦王飲酒酣，曰：「寡人竊聞趙王好音，請奏瑟。」趙王鼓瑟。秦御史前書曰：「某年月日，秦王與趙王會飲，令趙王鼓瑟。」藺相如前曰：「趙王竊聞秦王善為秦聲，請奏盆缻秦王，以相娛樂。」秦王怒，不許。於是相如前進缻，因跪請秦王。秦王不肯擊缻。相如曰：「五步之內，相如請得以頸血濺大王矣！」左右欲刃相如，相如張目叱之，左右皆靡。於是秦王不懌，為一擊缻。相如顧召趙御史書曰：「某年月日，秦王為趙王擊缻。」秦之羣臣曰：「請以趙十五城為秦王壽。」藺相如亦曰：「請以秦之咸陽為趙王壽。」秦王竟酒，終不能加勝於趙。趙亦盛設兵以待秦，秦不敢動。\n\n既罷歸國，以相如功大，拜為上卿，位在廉頗之右。廉頗曰：「我為趙將，有攻城野戰之大功，而藺相如徒以口舌為勞，而位居我上，且相如素賤人，吾羞，不忍為之下。」宣言曰：「我見相如，必辱之。」相如聞，不肯與會。相如每朝時，常稱病，不欲與廉頗爭列。已而相如出，望見廉頗，相如引車避匿。於是舍人相與諫曰：「臣所以去親戚而事君者，徒慕君之高義也。今君與廉頗同列，廉君宣惡言而君畏匿之，恐懼殊甚，且庸人尚羞之，況於將相乎！臣等不肖，請辭去。」藺相如固止之，曰：「公之視廉將軍孰與秦王？」曰：「不若也。」相如曰：「夫以秦王之威，而相如廷叱之，辱其羣臣，相如雖駑，獨畏廉將軍哉？顧吾念之，彊秦之所以不敢加兵於趙者，徒以吾兩人在也。今兩虎共鬥，其勢不俱生。吾所以為此者，以先國家之急而後私讎也。」廉頗聞之，肉袒負荊，因賓客至藺相如門謝罪。曰：「鄙賤之人，不知將軍寬之至此也。」卒相與驩，為刎頸之交。",
    "出師表": "先帝創業未半，而中道崩殂；今天下三分，益州疲弊，此誠危急存亡之秋也﹗然侍衞之臣，不懈於內；忠志之士，忘身於外者，蓋追先帝之殊遇，欲報之於陛下也。\n\n誠宜開張聖聽，以光先帝遺德，恢弘志士之氣﹔不宜妄自菲薄，引喻失義，以塞忠諫之路也。\n\n宮中、府中，俱為一體；陟罰臧否，不宜異同。若有作姦、犯科，及為忠善者，宜付有司，論其刑賞，以昭陛下平明之治；不宜偏私，使內外異法也。\n\n侍中、侍郎郭攸之、費禕、董允等，此皆良實，志慮忠純，是以先帝簡拔以遺陛下。愚以為宮中之事，事無大小，悉以咨之，然後施行，必能裨補闕漏，有所廣益。將軍向寵，性行淑均，曉暢軍事，試用於昔日，先帝稱之曰「能」，是以眾議舉寵為督。愚以為營中之事，悉以咨之，必能使行陣和睦，優劣得所。\n\n親賢臣，遠小人，此先漢所以興隆也﹔親小人，遠賢臣，此後漢所以傾頹也。先帝在時，每與臣論此事，未嘗不歎息痛恨於桓、靈也！侍中、尚書、長史、參軍，此悉貞良死節之臣，願陛下親之、信之，則漢室之隆，可計日而待也。\n\n臣本布衣，躬耕於南陽，苟全性命於亂世，不求聞達於諸侯。先帝不以臣卑鄙，猥自枉屈，三顧臣於草廬之中，諮臣以當世之事；由是感激，遂許先帝以驅馳。後值傾覆，受任於敗軍之際，奉命於危難之間，爾來二十有一年矣。先帝知臣謹慎，故臨崩寄臣以大事也。受命以來，夙夜憂歎，恐託付不效，以傷先帝之明。故五月渡瀘，深入不毛。今南方已定，兵甲已足，當獎率三軍，北定中原，庶竭駑鈍，攘除姦凶，興復漢室，還於舊都。此臣所以報先帝而忠陛下之職分也。至於斟酌損益，進盡忠言，則攸之、禕、允之任也。\n\n願陛下託臣以討賊興復之效；不效，則治臣之罪，以告先帝之靈。若無興德之言，則責攸之、禕、允等之慢，以彰其咎。陛下亦宜自謀，以諮諏善道，察納雅言，深追先帝遺詔。臣不勝受恩感激。今當遠離，臨表涕零，不知所言！",
    "師說": "古之學者必有師。師者，所以傳道、受業、解惑也。人非生而知之者，孰能無惑？惑而不從師，其為惑也終不解矣。\n\n生乎吾前，其聞道也，固先乎吾，吾從而師之；生乎吾後，其聞道也，亦先乎吾，吾從而師之。吾師道也，夫庸知其年之先後生於吾乎？是故無貴無賤，無長無少，道之所存，師之所存也。\n\n嗟乎！師道之不傳也久矣！欲人之無惑也難矣！古之聖人，其出人也遠矣，猶且從師而問焉；今之眾人，其下聖人也亦遠矣，而恥學於師；是故聖益聖，愚益愚，聖人之所以為聖，愚人之所以為愚，其皆出於此乎！\n\n愛其子，擇師而教之，於其身也則恥師焉，惑矣！彼童子之師，授之書而習其句讀者，非吾所謂傳其道、解其惑者也。句讀之不知，惑之不解，或師焉，或不焉，小學而大遺，吾未見其明也。\n\n巫、醫、樂師、百工之人，不恥相師；士大夫之族，曰師、曰弟子云者，則羣聚而笑之。問之，則曰︰「彼與彼年相若也，道相似也。」位卑則足羞，官盛則近諛。嗚呼！師道之不復，可知矣。巫、醫、樂師、百工之人，君子不齒，今其智乃反不能及，其可怪也歟！\n\n聖人無常師，孔子師郯子、萇弘、師襄、老聃。郯子之徒，其賢不及孔子。孔子曰︰「三人行，則必有我師。」是故弟子不必不如師，師不必賢於弟子；聞道有先後，術業有專攻，如是而已。\n\n李氏子蟠，年十七，好古文，六藝經傳，皆通習之；不拘於時，學於余。余嘉其能行古道，作《師說》以貽之。",
    "始得西山宴遊記": "自余為僇人，居是州，恒惴慄。其隙也，則施施而行，漫漫而遊。日與其徒上高山，入深林，窮迴溪，幽泉怪石，無遠不到。到則披草而坐，傾壺而醉。醉則更相枕以臥，臥而夢。意有所極，夢亦同趣。覺而起，起而歸。以為凡是州之山有異態者，皆我有也，而未始知西山之怪特。\n\n今年九月二十八日，因坐法華西亭，望西山，始指異之。遂命僕過湘江，緣染溪，斫榛莽。焚茅茷，窮山之高而止。攀援而登，箕踞而遨，則凡數州之土壤，皆在衽席之下。其高下之勢，岈然窪然，若垤若穴，尺寸千里，攢蹙累積，莫得遯隱。縈青繚白，外與天際，四望如一。然後知是山之特出，不與培塿為類。悠悠乎與顥氣俱，而莫得其涯；洋洋乎與造物者遊，而不知其所窮。引觴滿酌，頹然就醉，不知日之入。蒼然暮色，自遠而至，至無所見，而猶不欲歸。心凝形釋，與萬化冥合。然後知吾嚮之未始遊，遊於是乎始，故為之文以志。是歲元和四年也。",
    "岳陽樓記": "慶曆四年春，滕子京謫守巴陵郡。越明年，政通人和，百廢具興。乃重修岳陽樓，增其舊制，刻唐賢、今人詩賦於其上；屬予作文以記之。\n\n予觀夫巴陵勝狀，在洞庭一湖。銜遠山，吞長江，浩浩湯湯，橫無際涯；朝暉夕陰，氣象萬千。此則岳陽樓之大觀也，前人之述備矣。然則北通巫峽，南極瀟湘，遷客騷人，多會於此，覽物之情，得無異乎？\n\n若夫霪雨霏霏，連月不開；陰風怒號，濁浪排空；日星隱耀，山岳潛形；商旅不行，檣傾楫摧；薄暮冥冥，虎嘯猿啼。登斯樓也，則有去國懷鄉，憂讒畏譏，滿目蕭然，感極而悲者矣。\n\n至若春和景明，波瀾不驚，上下天光，一碧萬頃；沙鷗翔集，錦鱗游泳，岸芷汀蘭，郁郁青青。而或長煙一空，皓月千里，浮光躍金，靜影沉璧；漁歌互答，此樂何極！登斯樓也，則有心曠神怡，寵辱皆忘，把酒臨風，其喜洋洋者矣。\n\n嗟夫！予嘗求古仁人之心，或異二者之為。何哉？不以物喜，不以己悲。居廟堂之高，則憂其民；處江湖之遠，則憂其君。是進亦憂，退亦憂，然則何時而樂耶？其必曰：「先天下之憂而憂，後天下之樂而樂」歟！噫！微斯人，吾誰與歸！",
    "六國論": "六國破滅，非兵不利，戰不善，弊在賂秦。賂秦而力虧，破滅之道也。或曰：「六國互喪，率賂秦耶？」曰：「不賂者以賂者喪。」蓋失強援，不能獨完，故曰「弊在賂秦」也。\n\n秦以攻取之外，小則獲邑，大則得城，較秦之所得與戰勝而得者，其實百倍；諸侯之所亡與戰敗而亡者，其實亦百倍。則秦之所大欲，諸侯之所大患，固不在戰矣。思厥先祖父，暴霜露，斬荊棘，以有尺寸之地。子孫視之不甚惜，舉以予人，如棄草芥。今日割五城，明日割十城，然後得一夕安寢；起視四境，而秦兵又至矣。然則諸侯之地有限，暴秦之欲無厭，奉之彌繁，侵之愈急，故不戰而強弱勝負已判矣。至於顛覆，理固宜然。古人云：「以地事秦，猶抱薪救火，薪不盡，火不滅。」此言得之。\n\n齊人未嘗賂秦，終繼五國遷滅，何哉？與嬴而不助五國也。五國既喪，齊亦不免矣。燕趙之君，始有遠略，能守其土，義不賂秦。是故燕雖小國而後亡，斯用兵之效也。至丹以荊卿為計，始速禍焉。趙嘗五戰于秦，二敗而三勝；後秦擊趙者再，李牧連卻之；洎牧以讒誅，邯鄲為郡，惜其用武而不終也。且燕趙處秦革滅殆盡之際，可謂智力孤危，戰敗而亡，誠不得已。向使三國各愛其地，齊人勿附於秦，刺客不行，良將猶在，則勝負之數，存亡之理，當與秦相較，或未易量。\n\n嗚呼！以賂秦之地，封天下之謀臣；以事秦之心，禮天下之奇才；並力西嚮，則吾恐秦人食之不得下嚥也。悲夫！有如此之勢，而為秦人積威之所劫，日削月割，以趨於亡！為國者無使為積威之所劫哉！\n\n夫六國與秦皆諸侯，其勢弱於秦，而猶有可以不賂而勝之之勢；茍以天下之大，而從六國破亡之故事，是又在六國下矣！",
    "詩三首": "山居秋暝 王維\n空山新雨後，天氣晚來秋。\n明月松間照，清泉石上流。\n竹喧歸浣女，蓮動下漁舟。\n隨意春芳歇，王孫自可留。\n\n月下獨酌 (其一) 李白\n花間一壺酒，獨酌無相親。\n舉杯邀明月，對影成三人。\n月既不解飲，影徒隨我身。\n暫伴月將影，行樂須及春。\n我歌月徘徊，我舞影零亂。\n醒時同交歡，醉後各分散。\n永結無情遊，相期邈雲漢。\n\n登樓 杜甫\n花近高樓傷客心，萬方多難此登臨。\n錦江春色來天地，玉壘浮雲變古今。\n北極朝廷終不改，西山寇盜莫相侵。\n可憐後主還祠廟，日暮聊為梁甫吟。",
    "詞三首": "念奴嬌赤壁懷古 蘇軾\n大江東去，浪淘盡、千古風流人物。故壘西邊，人道是、三國周郎赤壁。亂石穿空，驚濤拍岸，捲起千堆雪。江山如畫，一時多少豪傑！\n遙想公瑾當年，小喬初嫁了，雄姿英發。羽扇綸巾，談笑間、檣櫓灰飛煙滅。故國神遊，多情應笑我，早生華髮。人間如夢，一尊還酹江月。\n\n聲聲慢秋情 李清照\n尋尋覓覓，冷冷清清，悽悽慘慘戚戚。乍煖還寒時候，最難將息。三杯兩盞淡酒，怎敵他晚來風急！雁過也，正傷心，卻是舊時相識。 \n滿地黃花堆積，憔悴損，如今有誰堪摘﹖守著窗兒，獨自怎生得黑！梧桐更兼細雨，到黃昏、點點滴滴。這次第，怎一箇愁字了得！\n\n青玉案元夕 辛棄疾\n東風夜放花千樹，更吹落、星如雨。寶馬雕車香滿路。鳳簫聲動，玉壺光轉，一夜魚龍舞。\n蛾兒雪柳黃金縷，笑語盈盈暗香去。眾裏尋他千百度；驀然迴首，那人卻在、燈火闌珊處。 "

// ==========================================
// 系統核心邏輯
// ==========================================
const chapters = [...new Set(rawQuestions.map(q => q.c))];
let gameState = { hp: 300, currentIndex: 0, questions: [], correctCount: 0, errorHistory: [], markedIds: new Set(), isPaused: false };

// 讀取永久成就數據
let userStats = JSON.parse(localStorage.getItem('dse_stats')) || {
    totalPlayed: 0,
    totalCorrect: 0,
    titles: ["修煉者"]
};

// 檢查存檔按鈕
window.onload = function() {
    if (localStorage.getItem('dse_game_save')) {
        document.getElementById('resume-btn').classList.remove('hidden');
    }
};

function saveGame() {
    const saveData = {
        gameState: gameState,
        saveDate: new Date().getTime()
    };
    localStorage.setItem('dse_game_save', JSON.stringify(saveData));
}

function resumeGame() {
    const saved = localStorage.getItem('dse_game_save');
    if (saved) {
        const data = JSON.parse(saved);
        gameState = data.gameState;
        // 恢復 Set 類型
        gameState.markedIds = new Set(gameState.markedIds);
        
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('status-bar').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        renderQuestion();
        alert("歡迎回來，進度已恢復至第 " + (gameState.currentIndex + 1) + " 題。");
    }
}

function showChapterSelect() {
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('chapter-screen').classList.remove('hidden');
    const list = document.getElementById('chapter-list');
    list.innerHTML = '';
    chapters.forEach((ch, idx) => {
        const div = document.createElement('div');
        div.className = 'stage-card';
        div.innerHTML = `<div><span style="color:var(--red)">${idx+1}.</span> 《${ch}》</div><span>挑戰 ▶</span>`;
        div.onclick = () => initGame('chapter', ch);
        list.appendChild(div);
    });
}

function initGame(mode, chName) {
    gameState = { hp: 300, currentIndex: 0, questions: [], correctCount: 0, errorHistory: [], markedIds: new Set(), isPaused: false };
    gameState.questions = mode === 'random' ? shuffle([...rawQuestions]) : shuffle(rawQuestions.filter(q => q.c === chName));
    
    if (gameState.questions.length === 0) return alert("暫無題目！");
    
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('chapter-screen').classList.add('hidden');
    document.getElementById('status-bar').classList.remove('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    renderQuestion();
}

function renderQuestion() {
    const q = gameState.questions[gameState.currentIndex];
    document.getElementById('chapter-display').innerText = `【${q.c}】`;
    document.getElementById('question-text').innerText = `(${gameState.currentIndex + 1}/${gameState.questions.length}) ${q.q}`;
    document.getElementById('mark-current').innerText = gameState.markedIds.has(q.id) ? "★ 已標記" : "⭐ 標記此題";
    
    const box = document.getElementById('options-box');
    box.innerHTML = '';
    let opts = [ {t: q.a, isCorrect: true}, ...q.w.map(text => ({t: text, isCorrect: false})) ];
    shuffle(opts).forEach(opt => {
        const b = document.createElement('button');
        b.className = 'btn-option';
        b.innerText = opt.t;
        b.onclick = (e) => handleAnswer(opt.isCorrect, opt.t, e.target);
        box.appendChild(b);
    });
    updateUI();
}

function handleAnswer(isCorrect, chosenText, btn) {
    if (gameState.isPaused) return;
    gameState.isPaused = true;
    const q = gameState.questions[gameState.currentIndex];

    if (isCorrect) {
        btn.classList.add('correct-flash');
        gameState.correctCount++;
    } else {
        btn.classList.add('wrong-flash', 'shake');
        gameState.hp -= 20;
        gameState.errorHistory.push({ q: q.q, your: chosenText, correct: q.a, ch: q.c });
        document.querySelectorAll('.btn-option').forEach(b => { 
            if(b.innerText === q.a) b.classList.add('correct-flash'); 
        });
    }

    updateUI();
    saveGame(); // 自動儲存進度

    setTimeout(() => {
        gameState.currentIndex++;
        gameState.isPaused = false;
        if (gameState.hp <= 0 || gameState.currentIndex >= gameState.questions.length) {
            localStorage.removeItem('dse_game_save'); // 結束後清空存檔
            showReport();
        } else {
            renderQuestion();
        }
    }, 1000);
}

function updateUI() {
    document.getElementById('hp-val').innerText = gameState.hp;
    const bar = document.getElementById('hp-bar');
    const percent = (gameState.hp/300*100);
    bar.style.width = percent + "%";
    bar.style.backgroundColor = percent > 50 ? "#2d5a27" : percent > 20 ? "#b8860b" : "#9d2933";
}

function showReport() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('status-bar').classList.add('hidden');
    document.getElementById('report-screen').classList.remove('hidden');
    
    const acc = (gameState.correctCount / gameState.questions.length) * 100 || 0;
    let grade = acc > 90 ? "5**" : acc >= 80 ? "5" : acc >= 65 ? "4" : acc >= 50 ? "3" : "2";
    
    // 更新永久統計數據
    userStats.totalPlayed++;
    userStats.totalCorrect += gameState.correctCount;
    if (acc === 100 && !userStats.titles.includes("狀元")) userStats.titles.push("狀元");
    if (userStats.totalCorrect >= 100 && !userStats.titles.includes("博學多才")) userStats.titles.push("博學多才");
    localStorage.setItem('dse_stats', JSON.stringify(userStats));

    document.getElementById('report-content').innerHTML = `
        <div class="seal">Level ${grade}</div>
        <h2>修煉完成：${acc.toFixed(1)}%</h2>
        <p>本次答對：${gameState.correctCount} 題</p>
    `;

    // 顯示成就
    const achieveDiv = document.getElementById('achievement-display');
    achieveDiv.innerHTML = "<h4>🏆 已獲勳章</h4>";
    userStats.titles.forEach(t => {
        achieveDiv.innerHTML += `<span class="achievement-badge">${t}</span>`;
    });

    const reviewList = document.getElementById('review-list');
    reviewList.innerHTML = '';
    
    let reviewItems = [...gameState.errorHistory];
    gameState.markedIds.forEach(id => {
        const q = rawQuestions.find(rq => rq.id === id);
        if (q && !gameState.errorHistory.find(eh => eh.q === q.q)) {
            reviewItems.push({ q: q.q, your: "(標記題目)", correct: q.a, ch: q.c });
        }
    });

    if(reviewItems.length === 0) {
        reviewList.innerHTML = "<p>無錯題紀錄，功力深厚！</p>";
    } else {
        reviewItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'review-item';
            div.innerHTML = `<strong>【${item.ch}】</strong> ${item.q}<br>
                             <span style="color:red">選了：${item.your}</span> | <span style="color:green">答案：${item.correct}</span>`;
            reviewList.appendChild(div);
        });
    }
}

function showAchievementBoard() {
    let msg = `📜 【我的修煉進度】\n\n`;
    msg += `● 總修煉次數：${userStats.totalPlayed}\n`;
    msg += `● 累計正確數：${userStats.totalCorrect}\n`;
    msg += `● 目前稱號：${userStats.titles.join(", ")}\n\n`;
    msg += `加油！目標是解鎖「翰林學士」稱號！`;
    alert(msg);
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function markQuestion() {
    const q = gameState.questions[gameState.currentIndex];
    if(gameState.markedIds.has(q.id)) gameState.markedIds.delete(q.id);
    else gameState.markedIds.add(q.id);
    document.getElementById('mark-current').innerText = gameState.markedIds.has(q.id) ? "★ 已標記" : "⭐ 標記此題";
}

function toggleLibrary(show) {
    const modal = document.getElementById('library-modal');
    modal.style.display = show ? 'block' : 'none';
    const nav = document.getElementById('lib-nav');
    if (show && nav.innerHTML === '') {
        chapters.forEach(ch => {
            const b = document.createElement('button');
            b.innerText = ch; b.className = 'btn-option'; b.style.width = 'auto'; b.style.padding = '5px 10px';
            b.onclick = () => {
                document.getElementById('lib-title').innerText = ch;
                document.getElementById('lib-text').innerText = originalTexts[ch] || "暫無原文資料。";
            };
            nav.appendChild(b);
        });
    }
}

function hintFromLibrary() {
    const q = gameState.questions[gameState.currentIndex];
    if (gameState.hp <= 20) return alert("體力不足，無法閱經！");
    gameState.hp -= 10;
    updateUI();
    const txt = originalTexts[q.c] ? originalTexts[q.c].substring(0, 150) + "..." : "暫無原文提示。";
    alert(`【${q.c} 經文片段】\n\n${txt}`);
}
</script>
